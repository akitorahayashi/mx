# This file is auto-generated. Do not edit manually.
# Asterism Organization
#
# Calls reusable worker workflows in a serialized chain for repository-level
# organization flow.

name: Asterism Organization

on:
  workflow_dispatch:
    inputs:
      organization_entry_point:
        description: 'Start from workflow'
        type: choice
        options:
          - optimizers
          - innovators
        default: 'optimizers'
      wait_minutes:
        description: 'Minutes to wait between layers (Asterism async processing time)'
        type: number
        default: 30
      mock:
        description: 'Run in mock mode (creates branches/PRs without Asterism API)'
        type: boolean
        default: false

permissions: {}

# The caller workflow keeps its own lock identity.
# Reused worker workflows keep the shared `astm-worker` lock.
# Using the same concurrency group in both caller and callee causes
# GitHub Actions deadlock/cancellation for the reusable jobs.
concurrency:
  group: 'astm-organization'
  cancel-in-progress: false

env:
  ASTM_TARGET_BRANCH: 'main'
  ASTM_WORKER_BRANCH: 'jules'

jobs:
  # ============================================================
  # Resolve organization chain plan
  # ============================================================
  resolve-organization-plan:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      json: ${{ steps.check.outputs.json }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: 'main'
          fetch-depth: 0
          token: ${{ secrets.ASTM_BOT_PAT }}

      - name: Install astm
        uses: asterismhq/setup-astm@v2
        with:
          token: ${{ secrets.ASTM_INSTALL_PAT }}
          version: '27.1.0'
          submodule_token: ${{ secrets.ASTM_SUBMODULE_PAT }}

      - name: Resolve organization plan
        id: check
        env:
          ENTRY_POINT: ${{ github.event.inputs.organization_entry_point || 'optimizers' }}
        run: |
          set -euo pipefail
          astm workflow resolve organization-plan --entry-point "$ENTRY_POINT"


  # ============================================================
  # Run optimizers workflow
  # ============================================================
  run-optimizers:
    needs: [resolve-organization-plan]
    if: |
      !cancelled() &&
      needs.resolve-organization-plan.result == 'success' &&
      fromJSON(needs.resolve-organization-plan.outputs.json || '{}').run_optimizers == true
    uses: ./.github/workflows/astm-optimizers.yml
    secrets: inherit
    with:
      entry_point: observers
      wait_minutes: ${{ fromJSON(github.event.inputs.wait_minutes || '30') }}
      mock: ${{ github.event.inputs.mock == 'true' }}

  # ============================================================
  # Run innovators workflow
  # ============================================================
  run-innovators:
    needs: [resolve-organization-plan, run-optimizers]
    if: |
      !cancelled() &&
      needs.resolve-organization-plan.result == 'success' &&
      fromJSON(needs.resolve-organization-plan.outputs.json || '{}').run_innovators == true &&
      (needs.run-optimizers.result == 'success' || needs.run-optimizers.result == 'skipped')
    uses: ./.github/workflows/astm-innovators.yml
    secrets: inherit
    with:
      wait_minutes: ${{ fromJSON(github.event.inputs.wait_minutes || '30') }}
      mock: ${{ github.event.inputs.mock == 'true' }}

# Asterism Doctors - Documentation Maintenance
#
# Orchestrates the doctors layer for canonical documentation synchronization.
# Supports direct dispatch and reusable invocation.

name: Asterism Doctors

on:
  workflow_dispatch:
    inputs:
      role:
        description: 'Doctor role to run'
        type: choice
        options:

          - steward

        default: steward
      mock:
        description: 'Run in mock mode (creates branches/PRs without Asterism API)'
        type: boolean
        default: false
  workflow_call:
    inputs:
      role:
        description: 'Doctor role to run'
        type: string
        default: 'steward'
      mock:
        description: 'Run in mock mode (creates branches/PRs without Asterism API)'
        type: boolean
        default: false

permissions: {}

concurrency:
  group: 'astm-worker'
  cancel-in-progress: false

env:
  MOCK_MODE: ${{ github.event_name == 'workflow_call' && inputs.mock == true || github.event.inputs.mock == 'true' }}
  ASTM_MOCK_TAG: ${{ format('mock_run_{0}', github.run_id) }}
  ASTM_RUN_FLAGS: ${{ ((github.event_name == 'workflow_call' && inputs.mock == true) || github.event.inputs.mock == 'true') && '--mock' || '' }}
  ASTM_TARGET_BRANCH: 'main'
  ASTM_WORKER_BRANCH: 'jules'
  DOCTOR_ROLE: ${{ github.event_name == 'workflow_call' && inputs.role || github.event.inputs.role || 'steward' }}

jobs:
  # ============================================================
  # Bootstrap runtime repository on worker branch
  # ============================================================

  bootstrap:
    
    if: >-
      (github.event_name == 'workflow_dispatch' || github.event_name == 'workflow_call') &&
      
      true
      
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      GH_TOKEN: ${{ secrets.ASTM_BOT_PAT }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: 'main'
          fetch-depth: 0
          token: ${{ secrets.ASTM_BOT_PAT }}


      - name: Configure Git
        run: |
          set -euo pipefail
          git config user.name "aria"
          git config user.email "aria67323@gmail.com"

      - name: Install astm
        uses: asterismhq/setup-astm@v2
        with:
          token: ${{ secrets.ASTM_INSTALL_PAT }}
          version: '27.1.0'
          submodule_token: ${{ secrets.ASTM_SUBMODULE_PAT }}

      - name: Sync worker branch
        run: astm workflow bootstrap worker-branch

      - name: Bootstrap managed files
        run: astm workflow bootstrap managed-files

      - name: Validate repository structure
        run: astm workflow validate

      - name: Create bootstrap sync PR to worker branch
        id: sync_pr
        run: astm workflow create-sync-pr --preset "bootstrap"

      - name: Wait for bootstrap sync PR merge
        id: wait_for_sync_pr
        if: ${{ fromJSON(steps.sync_pr.outputs.json || '{}').applied == true }}
        env:
          GH_TOKEN: ${{ secrets.ASTM_BOT_PAT }}
          PR_NUMBER: ${{ fromJSON(steps.sync_pr.outputs.json || '{}').pr_number }}
        uses: akitorahayashi/retry@v1
        with:
          command: >-
            astm workflow gh inspect-pr-merge "$PR_NUMBER"
          max_attempts: '8'
          retry_on: error
          retry_on_exit_codes: '11'
          # Sync PR merge state has an initial GitHub visibility lag after publication. The first retry waits 3s; later retries use 1,2,4,8,16,32s.
          retry_delay_schedule_seconds: '10,1,2,4,8,16,32'


  # ============================================================
  # Run selected doctor
  # ============================================================

  
  
  
  
  run-doctors:
    needs: ["bootstrap"]
    
    if: |
      !cancelled() &&


    
      needs.bootstrap.result == 'success'
    

    
    runs-on: ubuntu-latest
    timeout-minutes: 40
    outputs:
      json: ${{ steps.report.outputs.json }}
    env:
      JULES_API_KEY: ${{ secrets.JULES_API_KEY }}
      GH_TOKEN: ${{ secrets.ASTM_BOT_PAT }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: 'main'
          fetch-depth: 0
          token: ${{ secrets.ASTM_BOT_PAT }}


      - name: Configure Git
        run: |
          set -euo pipefail
          git config user.name "aria"
          git config user.email "aria67323@gmail.com"

      - name: Install astm
        uses: asterismhq/setup-astm@v2
        with:
          token: ${{ secrets.ASTM_INSTALL_PAT }}
          version: '27.1.0'
          submodule_token: ${{ secrets.ASTM_SUBMODULE_PAT }}
      - name: Run doctor
        id: run
        if: ${{ needs.bootstrap.result == 'success' }}
        continue-on-error: true
        uses: akitorahayashi/retry@v1
        with:
          command: >-
            astm run --json doctors ${{ env.ASTM_RUN_FLAGS }} --role "${DOCTOR_ROLE}"
          max_attempts: '8'
          retry_delay_schedule_seconds: '1,2,4,8,16,32,64'
      - name: Report Run doctor status
        id: report
        if: ${{ always() }}
        env:
          REQUESTED_FLAG: ${{ true }}
          REQUEST_RESULT: ${{ steps.run.outcome }}
          RUN_JSON: ${{ steps.run.outputs.final_stdout || '{}' }}
        run: |
          set -euo pipefail
          astm workflow resolve run-status \
            --requested "${REQUESTED_FLAG}" \
            --result "${REQUEST_RESULT}" \
            --run-json "${RUN_JSON}"

  # ============================================================
  # Cleanup mock artifacts
  # ============================================================


  cleanup-mock-artifacts:
    needs: ["run-doctors"]
    if: |
      !cancelled() &&
      always() &&
      (
        (github.event_name == 'workflow_dispatch' && github.event.inputs.mock == 'true') ||
        (github.event_name == 'workflow_call' && inputs.mock == true)
      )
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      GH_TOKEN: ${{ secrets.ASTM_BOT_PAT }}
      GITHUB_REPOSITORY: ${{ github.repository }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: 'jules'
          fetch-depth: 0
          token: ${{ secrets.ASTM_BOT_PAT }}


      - name: Configure Git
        run: |
          set -euo pipefail
          git config user.name "aria"
          git config user.email "aria67323@gmail.com"

      - name: Install astm
        uses: asterismhq/setup-astm@v2
        with:
          token: ${{ secrets.ASTM_INSTALL_PAT }}
          version: '27.1.0'
          submodule_token: ${{ secrets.ASTM_SUBMODULE_PAT }}

      - name: Cleanup mock artifacts for this run
        run: |
          astm workflow clean-mock --mock-tag "$ASTM_MOCK_TAG"

      - name: Validate repository structure
        run: astm workflow validate

      - name: Create mock cleanup sync PR
        run: |
          astm workflow create-sync-pr \
            --preset "mock-cleanup-${ASTM_MOCK_TAG}"




name: Run Tests

on:
  workflow_call:

jobs:
  test:
    name: Run all tests
    runs-on: ubuntu-latest
    env:
      RUST_BACKTRACE: 1

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup environment
        uses: ./.github/actions/setup
        with:
          install-mise: 'true'
          mise-tools: just

      - name: Run all tests
        run: mise exec -- just test

      - name: Run implementer (${{ matrix.target }})
        id: run
        uses: akitorahayashi/retry@v1
        with:
          command: >-
            astm run --json implementer --issue "${{ matrix.target }}" ${{ env.ASTM_RUN_FLAGS }}
          max_attempts: '8'
          retry_delay_schedule_seconds: '1,2,4,8,16,32,64'

  report-implementer-status:
    needs: ["resolve-implementer-matrix", "request-implementer-run"]
    if: |
      !cancelled() &&

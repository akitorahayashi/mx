name: CI Workflows

on:
  push:
    branches: [ "main" ]
    paths-ignore:
      - '**.md'
  pull_request:
    branches: [ "main" ]
    paths-ignore:
      - '**.md'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint:
    permissions:
      contents: read
    uses: ./.github/workflows/run-linters.yml

  build:
    name: Build
    permissions:
      contents: read
    uses: ./.github/workflows/build.yml

  test:
    name: Test
    permissions:
      contents: read
    uses: ./.github/workflows/run-tests.yml

  coverage:
    name: Coverage
    permissions:
      contents: read
    uses: ./.github/workflows/collect-coverage.yml

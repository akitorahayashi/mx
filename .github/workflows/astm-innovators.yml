# This file is auto-generated. Do not edit manually.
name: Asterism Innovators

on:
  workflow_dispatch:
    inputs:

      role:
        description: 'Innovator role to run'
        type: choice
        options:
          - all-enabled

          - partitioner

          - unifier

          - formulator

          - seeder

          - warden

          - composer

          - multiplier

          - mapper

          - verifier

        default: all-enabled

      wait_minutes:
        description: 'Minutes to wait for Asterism async processing'
        type: number
        default: 30
      mock:
        description: 'Run in mock mode (creates branches/PRs without Asterism API)'
        type: boolean
        default: false
  workflow_call:
    inputs:
      role:
        description: 'Innovator role to run'
        type: string
        default: 'all-enabled'
      wait_minutes:
        description: 'Minutes to wait for Asterism async processing'
        type: number
        default: 30
      mock:
        description: 'Run in mock mode (creates branches/PRs without Asterism API)'
        type: boolean
        default: false

permissions: {}

concurrency:
  group: 'astm-worker'
  cancel-in-progress: false

env:
  WAIT_MINUTES: ${{ github.event_name == 'workflow_call' && (inputs.wait_minutes || 30) || github.event.inputs.wait_minutes || 30 }}
  MOCK_MODE: ${{ github.event_name == 'workflow_call' && inputs.mock == true || github.event.inputs.mock == 'true' }}
  ASTM_MOCK_TAG: ${{ format('mock_run_{0}', github.run_id) }}
  ASTM_RUN_FLAGS: ${{ ((github.event_name == 'workflow_call' && inputs.mock == true) || github.event.inputs.mock == 'true') && '--mock' || '' }}
  ASTM_TARGET_BRANCH: 'main'
  ASTM_WORKER_BRANCH: 'jules'
  INNOVATOR_TARGET_ROLE: ${{ (github.event_name == 'workflow_call' && inputs.role) || github.event.inputs.role || 'all-enabled' }}


jobs:
  # ============================================================
  # Bootstrap runtime repository on worker branch
  # ============================================================

  bootstrap:
    
    if: >-
      (github.event_name == 'workflow_dispatch' || github.event_name == 'workflow_call') &&
      
      true
      
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      GH_TOKEN: ${{ secrets.ASTM_BOT_PAT }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: 'main'
          fetch-depth: 0
          token: ${{ secrets.ASTM_BOT_PAT }}


      - name: Configure Git
        run: |
          set -euo pipefail
          git config user.name "aria"
          git config user.email "aria67323@gmail.com"

      - name: Install astm
        uses: asterismhq/setup-astm@v2
        with:
          token: ${{ secrets.ASTM_INSTALL_PAT }}
          version: '27.1.0'
          submodule_token: ${{ secrets.ASTM_SUBMODULE_PAT }}

      - name: Sync worker branch
        run: astm workflow bootstrap worker-branch

      - name: Bootstrap managed files
        run: astm workflow bootstrap managed-files

      - name: Validate repository structure
        run: astm workflow validate

      - name: Create bootstrap sync PR to worker branch
        id: sync_pr
        run: astm workflow create-sync-pr --preset "bootstrap"

      - name: Wait for bootstrap sync PR merge
        id: wait_for_sync_pr
        if: ${{ fromJSON(steps.sync_pr.outputs.json || '{}').applied == true }}
        env:
          GH_TOKEN: ${{ secrets.ASTM_BOT_PAT }}
          PR_NUMBER: ${{ fromJSON(steps.sync_pr.outputs.json || '{}').pr_number }}
        uses: akitorahayashi/retry@v1
        with:
          command: >-
            astm workflow gh inspect-pr-merge "$PR_NUMBER"
          max_attempts: '8'
          retry_on: error
          retry_on_exit_codes: '11'
          # Sync PR merge state has an initial GitHub visibility lag after publication. The first retry waits 3s; later retries use 1,2,4,8,16,32s.
          retry_delay_schedule_seconds: '10,1,2,4,8,16,32'


  # ============================================================
  # Resolve innovators matrix
  # ============================================================

  resolve-innovators-matrix:
    needs: ["bootstrap"]
    if: |
      !cancelled() &&

      needs.bootstrap.result == 'success'


    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      GH_TOKEN: ${{ secrets.ASTM_BOT_PAT }}
    outputs:
      json: ${{ steps.resolve.outputs.json }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: 'jules'
          fetch-depth: 0
          token: ${{ secrets.ASTM_BOT_PAT }}


      - name: Configure Git
        run: |
          set -euo pipefail
          git config user.name "aria"
          git config user.email "aria67323@gmail.com"

      - name: Install astm
        uses: asterismhq/setup-astm@v2
        with:
          token: ${{ secrets.ASTM_INSTALL_PAT }}
          version: '27.1.0'
          submodule_token: ${{ secrets.ASTM_SUBMODULE_PAT }}

      - name: Resolve innovators targets
        id: resolve

        env:
          STATIC_TARGET: ${{ env.INNOVATOR_TARGET_ROLE != 'all-enabled' && env.INNOVATOR_TARGET_ROLE || '' }}

        run: |
          set -euo pipefail
          static_target="${STATIC_TARGET:-}"
          if [ -n "${static_target}" ]; then
            json=$(printf '{"layer":"%s","count":1,"skipped_count":0,"matrix":[{"target":"%s"}]}' "innovators" "${static_target}")
            {
              echo "json=${json}"
              echo "count=1"
              echo "skipped_count=0"
              echo "layer=innovators"
            } >> "${GITHUB_OUTPUT}"
          elif [ "${MOCK_MODE}" = "true" ]; then
            astm workflow resolve matrix --layer innovators --mock
          else
            astm workflow resolve matrix --layer innovators
          fi
  # ============================================================
  # Run innovators (matrix)
  # ============================================================

  
  
  
  
  
  request-innovators-run:
    needs: ["bootstrap", "resolve-innovators-matrix"]
    
    if: |
      !cancelled() &&



    
      needs.bootstrap.result == 'success' &&
    

    
      needs.resolve-innovators-matrix.result == 'success' &&
    

      fromJSON(needs.resolve-innovators-matrix.outputs.json || '{"count":0,"skipped_count":0,"matrix":[]}').count > 0 &&
      fromJSON(needs.resolve-innovators-matrix.outputs.json || '{"count":0,"skipped_count":0,"matrix":[]}').count > 0
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # Asterism API session creation requests must run strictly one-by-one.
    # Keep max-parallel fixed to 1; worker limits are enforced by target truncation at matrix-resolution time.
    # The matrix is kept for visibility of resolved target count in the GitHub Actions GUI.
    strategy:
      matrix:
        include: ${{ fromJSON(needs.resolve-innovators-matrix.outputs.json || '{"count":0,"skipped_count":0,"matrix":[]}').matrix }}
      max-parallel: 1
      fail-fast: false
    outputs:
      json: ${{ steps.run.outputs.final_stdout }}
    env:
      JULES_API_KEY: ${{ secrets.JULES_API_KEY }}
      GH_TOKEN: ${{ secrets.ASTM_BOT_PAT }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: 'jules'
          fetch-depth: 0
          token: ${{ secrets.ASTM_BOT_PAT }}


      - name: Configure Git
        run: |
          set -euo pipefail
          git config user.name "aria"
          git config user.email "aria67323@gmail.com"

      - name: Install astm
        uses: asterismhq/setup-astm@v2
        with:
          token: ${{ secrets.ASTM_INSTALL_PAT }}
          version: '27.1.0'
          submodule_token: ${{ secrets.ASTM_SUBMODULE_PAT }}

      - name: Run innovator (${{ matrix.target }})
        id: run
        uses: akitorahayashi/retry@v1
        with:
          command: >-
            astm run --json innovators --role "${{ matrix.target }}" ${{ env.ASTM_RUN_FLAGS }} --task create_proposals
          max_attempts: '8'
          retry_delay_schedule_seconds: '1,2,4,8,16,32,64'

  report-innovators-status:
    needs: ["bootstrap", "resolve-innovators-matrix", "request-innovators-run"]
    if: |
      !cancelled() &&
      always() &&

      needs.resolve-innovators-matrix.result == 'success' &&
      needs.resolve-innovators-matrix.result == 'success'


    runs-on: ubuntu-latest
    timeout-minutes: 70
    outputs:
      json: ${{ steps.report.outputs.json }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: 'jules'
          fetch-depth: 0
          token: ${{ secrets.ASTM_BOT_PAT }}


      - name: Configure Git
        run: |
          set -euo pipefail
          git config user.name "aria"
          git config user.email "aria67323@gmail.com"

      - name: Install astm
        uses: asterismhq/setup-astm@v2
        with:
          token: ${{ secrets.ASTM_INSTALL_PAT }}
          version: '27.1.0'
          submodule_token: ${{ secrets.ASTM_SUBMODULE_PAT }}

      - name: Report Run innovator status
        id: report
        env:
          REQUESTED_FLAG: ${{ fromJSON(needs.resolve-innovators-matrix.outputs.json || '{"count":0,"skipped_count":0,"matrix":[]}').count > 0 }}
          TARGET_COUNT: ${{ fromJSON(needs.resolve-innovators-matrix.outputs.json || '{"count":0,"skipped_count":0,"matrix":[]}').count }}
          REQUEST_RESULT: ${{ needs.request-innovators-run.result }}
        run: |
          set -euo pipefail
          astm workflow resolve matrix-run-status \
            --requested "${REQUESTED_FLAG}" \
            --result "${REQUEST_RESULT}" \
            --target-count "${TARGET_COUNT}"

      - name: Wait ${{ env.WAIT_MINUTES }} minutes for Asterism async processing
        if: ${{ !cancelled() && always() && steps.report.outcome == 'success' }}
        uses: akitorahayashi/wait@v1
        with:
          enabled: ${{ fromJSON(steps.report.outputs.json || '{}').requested == true }}
          minutes: ${{ env.WAIT_MINUTES }}
          seconds: ${{ env.MOCK_MODE == 'true' && '15' || '' }}
          label: 'Asterism async processing for innovators'

  # ============================================================
  # Publish innovators proposals
  # ============================================================

  publish-innovator-issues:
    needs: [report-innovators-status]
    if: |
      needs.report-innovators-status.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      GH_TOKEN: ${{ secrets.ASTM_BOT_PAT }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: 'jules'
          fetch-depth: 0
          token: ${{ secrets.ASTM_BOT_PAT }}


      - name: Configure Git
        run: |
          set -euo pipefail
          git config user.name "aria"
          git config user.email "aria67323@gmail.com"

      - name: Install astm
        uses: asterismhq/setup-astm@v2
        with:
          token: ${{ secrets.ASTM_INSTALL_PAT }}
          version: '27.1.0'
          submodule_token: ${{ secrets.ASTM_SUBMODULE_PAT }}

      - name: Publish innovator issues
        run: astm workflow publish innovator-issues

      - name: Validate structure
        run: astm workflow validate

      - name: Create published proposal cleanup sync PR
        run: |
          astm workflow create-sync-pr \
            --preset "publish-innovator-issues"


  # ============================================================
  # Cleanup mock artifacts
  # ============================================================


  cleanup-mock-artifacts:
    needs: ["publish-innovator-issues"]
    if: |
      !cancelled() &&
      always() &&
      (
        (github.event_name == 'workflow_dispatch' && github.event.inputs.mock == 'true') ||
        (github.event_name == 'workflow_call' && inputs.mock == true)
      )
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      GH_TOKEN: ${{ secrets.ASTM_BOT_PAT }}
      GITHUB_REPOSITORY: ${{ github.repository }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: 'jules'
          fetch-depth: 0
          token: ${{ secrets.ASTM_BOT_PAT }}


      - name: Configure Git
        run: |
          set -euo pipefail
          git config user.name "aria"
          git config user.email "aria67323@gmail.com"

      - name: Install astm
        uses: asterismhq/setup-astm@v2
        with:
          token: ${{ secrets.ASTM_INSTALL_PAT }}
          version: '27.1.0'
          submodule_token: ${{ secrets.ASTM_SUBMODULE_PAT }}

      - name: Cleanup mock artifacts for this run
        run: |
          astm workflow clean-mock --mock-tag "$ASTM_MOCK_TAG"

      - name: Validate repository structure
        run: astm workflow validate

      - name: Create mock cleanup sync PR
        run: |
          astm workflow create-sync-pr \
            --preset "mock-cleanup-${ASTM_MOCK_TAG}"


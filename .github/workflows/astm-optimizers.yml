# This file is auto-generated. Do not edit manually.
name: Asterism Optimizers

on:
  workflow_dispatch:
    inputs:
      entry_point:
        description: 'Start from phase'
        type: choice
        options:
          - observers
          - merger
          - dispatcher
          - publish-requirements
          - planner
          - publish-plans
          - implementer
        default: observers
      single_layer:
        description: 'Run only the specified entry point layer'
        type: boolean
        default: false
      wait_minutes:
        description: 'Minutes to wait between layers (Asterism async processing time)'
        type: number
        default: 30

      tag:
        description: 'Observer tag filter'
        type: choice
        options:
          - all-enabled

          - std_checks

        default: all-enabled

      mock:
        description: 'Run in mock mode (creates branches/PRs without Asterism API)'
        type: boolean
        default: false
  workflow_call:
    inputs:
      entry_point:
        description: 'Start from phase'
        type: string
        default: observers
      single_layer:
        description: 'Run only the specified entry point layer'
        type: boolean
        default: false
      wait_minutes:
        description: 'Minutes to wait between layers (Asterism async processing time)'
        type: number
        default: 30
      mock:
        description: 'Run in mock mode (creates branches/PRs without Asterism API)'
        type: boolean
        default: false

permissions: {}

concurrency:
  group: 'astm-worker'
  cancel-in-progress: false

env:
  WAIT_MINUTES: ${{ github.event_name == 'workflow_call' && (inputs.wait_minutes || 30) || github.event_name == 'workflow_dispatch' && (github.event.inputs.wait_minutes || 30) || 30 }}
  MOCK_MODE: ${{ github.event_name == 'workflow_call' && inputs.mock == true || github.event_name == 'workflow_dispatch' && github.event.inputs.mock == 'true' }}
  ASTM_MOCK_TAG: ${{ format('mock_run_{0}', github.run_id) }}
  ASTM_RUN_FLAGS: ${{ ((github.event_name == 'workflow_call' && inputs.mock == true) || (github.event_name == 'workflow_dispatch' && github.event.inputs.mock == 'true')) && '--mock' || '' }}
  OBSERVER_TAG_FILTER: ${{ github.event_name == 'workflow_dispatch' && (github.event.inputs.tag || 'all-enabled') || 'all-enabled' }}
  ASTM_TARGET_BRANCH: 'main'
  ASTM_WORKER_BRANCH: 'jules'




jobs:
  # ============================================================
  # Bootstrap runtime repository on worker branch
  # ============================================================

  bootstrap:
    
    if: >-
      (github.event_name == 'workflow_dispatch' || github.event_name == 'workflow_call') &&
      
      true
      
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      GH_TOKEN: ${{ secrets.ASTM_BOT_PAT }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: 'main'
          fetch-depth: 0
          token: ${{ secrets.ASTM_BOT_PAT }}


      - name: Configure Git
        run: |
          set -euo pipefail
          git config user.name "aria"
          git config user.email "aria67323@gmail.com"

      - name: Install astm
        uses: asterismhq/setup-astm@v2
        with:
          token: ${{ secrets.ASTM_INSTALL_PAT }}
          version: '27.1.0'
          submodule_token: ${{ secrets.ASTM_SUBMODULE_PAT }}

      - name: Sync worker branch
        run: astm workflow bootstrap worker-branch

      - name: Bootstrap managed files
        run: astm workflow bootstrap managed-files

      - name: Validate repository structure
        run: astm workflow validate

      - name: Create bootstrap sync PR to worker branch
        id: sync_pr
        run: astm workflow create-sync-pr --preset "bootstrap"

      - name: Wait for bootstrap sync PR merge
        id: wait_for_sync_pr
        if: ${{ fromJSON(steps.sync_pr.outputs.json || '{}').applied == true }}
        env:
          GH_TOKEN: ${{ secrets.ASTM_BOT_PAT }}
          PR_NUMBER: ${{ fromJSON(steps.sync_pr.outputs.json || '{}').pr_number }}
        uses: akitorahayashi/retry@v1
        with:
          command: >-
            astm workflow gh inspect-pr-merge "$PR_NUMBER"
          max_attempts: '8'
          retry_on: error
          retry_on_exit_codes: '11'
          # Sync PR merge state has an initial GitHub visibility lag after publication. The first retry waits 3s; later retries use 1,2,4,8,16,32s.
          retry_delay_schedule_seconds: '10,1,2,4,8,16,32'


  # ============================================================
  # Resolve run plan
  # ============================================================
  resolve-optimizers-plan:
    needs: [bootstrap]
    if: |
      needs.bootstrap.result == 'success' &&
      (github.event_name == 'workflow_dispatch' || github.event_name == 'workflow_call')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      json: ${{ steps.check.outputs.json }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: 'jules'
          fetch-depth: 0
          token: ${{ secrets.ASTM_BOT_PAT }}

      - name: Install astm
        uses: asterismhq/setup-astm@v2
        with:
          token: ${{ secrets.ASTM_INSTALL_PAT }}
          version: '27.1.0'
          submodule_token: ${{ secrets.ASTM_SUBMODULE_PAT }}

      - name: Resolve optimizers plan
        id: check
        env:
          EVENT_NAME: ${{ github.event_name == 'workflow_call' && 'workflow_dispatch' || github.event_name }}
          ENTRY_POINT: ${{ github.event_name == 'workflow_call' && (inputs.entry_point || 'observers') || github.event_name == 'workflow_dispatch' && (github.event.inputs.entry_point || 'observers') || '' }}
          SINGLE_LAYER: ${{ github.event_name == 'workflow_call' && inputs.single_layer == true || github.event_name == 'workflow_dispatch' && github.event.inputs.single_layer == 'true' }}
        run: |
          set -euo pipefail
          astm workflow resolve optimizers-plan "$EVENT_NAME" --entry-point "$ENTRY_POINT" --single-layer "$SINGLE_LAYER"


  # ============================================================
  # Resolve and run observers (matrix)
  # ============================================================

  resolve-observers-matrix:
    needs: ["resolve-optimizers-plan"]
    if: |
      !cancelled() &&

      needs.resolve-optimizers-plan.result == 'success' &&


      fromJSON(needs.resolve-optimizers-plan.outputs.json || '{}').run_observers == true

    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      GH_TOKEN: ${{ secrets.ASTM_BOT_PAT }}
    outputs:
      json: ${{ steps.resolve.outputs.json }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: 'jules'
          fetch-depth: 0
          token: ${{ secrets.ASTM_BOT_PAT }}


      - name: Configure Git
        run: |
          set -euo pipefail
          git config user.name "aria"
          git config user.email "aria67323@gmail.com"

      - name: Install astm
        uses: asterismhq/setup-astm@v2
        with:
          token: ${{ secrets.ASTM_INSTALL_PAT }}
          version: '27.1.0'
          submodule_token: ${{ secrets.ASTM_SUBMODULE_PAT }}

      - name: Resolve observers targets
        id: resolve

        run: |
          set -euo pipefail
          static_target="${STATIC_TARGET:-}"
          if [ -n "${static_target}" ]; then
            json=$(printf '{"layer":"%s","count":1,"skipped_count":0,"matrix":[{"target":"%s"}]}' "observers" "${static_target}")
            {
              echo "json=${json}"
              echo "count=1"
              echo "skipped_count=0"
              echo "layer=observers"
            } >> "${GITHUB_OUTPUT}"
          elif [ "${MOCK_MODE}" = "true" ]; then
            astm workflow resolve matrix --layer observers --mock --tag "${OBSERVER_TAG_FILTER}"
          else
            astm workflow resolve matrix --layer observers --tag "${OBSERVER_TAG_FILTER}"
          fi

  
  
  
  
  
  request-observers-run:
    needs: ["resolve-optimizers-plan", "resolve-observers-matrix"]
    
    if: |
      !cancelled() &&



    
      needs.resolve-optimizers-plan.result == 'success' &&
    

    
      needs.resolve-observers-matrix.result == 'success' &&
    

      fromJSON(needs.resolve-optimizers-plan.outputs.json || '{}').run_observers == true &&
      fromJSON(needs.resolve-observers-matrix.outputs.json || '{"count":0,"skipped_count":0,"matrix":[]}').count > 0
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # Asterism API session creation requests must run strictly one-by-one.
    # Keep max-parallel fixed to 1; worker limits are enforced by target truncation at matrix-resolution time.
    # The matrix is kept for visibility of resolved target count in the GitHub Actions GUI.
    strategy:
      matrix:
        include: ${{ fromJSON(needs.resolve-observers-matrix.outputs.json || '{"count":0,"skipped_count":0,"matrix":[]}').matrix }}
      max-parallel: 1
      fail-fast: false
    outputs:
      json: ${{ steps.run.outputs.final_stdout }}
    env:
      JULES_API_KEY: ${{ secrets.JULES_API_KEY }}
      GH_TOKEN: ${{ secrets.ASTM_BOT_PAT }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: 'jules'
          fetch-depth: 0
          token: ${{ secrets.ASTM_BOT_PAT }}


      - name: Configure Git
        run: |
          set -euo pipefail
          git config user.name "aria"
          git config user.email "aria67323@gmail.com"

      - name: Install astm
        uses: asterismhq/setup-astm@v2
        with:
          token: ${{ secrets.ASTM_INSTALL_PAT }}
          version: '27.1.0'
          submodule_token: ${{ secrets.ASTM_SUBMODULE_PAT }}

      - name: Run observers (${{ matrix.target }})
        id: run
        uses: akitorahayashi/retry@v1
        with:
          command: >-
            astm run --json observers --role "${{ matrix.target }}" ${{ env.ASTM_RUN_FLAGS }} --task emit_events
          max_attempts: '8'
          retry_delay_schedule_seconds: '1,2,4,8,16,32,64'

  report-observers-status:
    needs: ["resolve-optimizers-plan", "resolve-observers-matrix", "request-observers-run"]
    if: |
      !cancelled() &&
      always() &&

      needs.resolve-optimizers-plan.result == 'success' &&
      needs.resolve-observers-matrix.result == 'success'


      &&
      fromJSON(needs.resolve-optimizers-plan.outputs.json || '{}').run_observers == true

    runs-on: ubuntu-latest
    timeout-minutes: 70
    outputs:
      json: ${{ steps.report.outputs.json }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: 'jules'
          fetch-depth: 0
          token: ${{ secrets.ASTM_BOT_PAT }}


      - name: Configure Git
        run: |
          set -euo pipefail
          git config user.name "aria"
          git config user.email "aria67323@gmail.com"

      - name: Install astm
        uses: asterismhq/setup-astm@v2
        with:
          token: ${{ secrets.ASTM_INSTALL_PAT }}
          version: '27.1.0'
          submodule_token: ${{ secrets.ASTM_SUBMODULE_PAT }}

      - name: Report Run observers status
        id: report
        env:
          REQUESTED_FLAG: ${{ fromJSON(needs.resolve-optimizers-plan.outputs.json || '{}').run_observers == true }}
          TARGET_COUNT: ${{ fromJSON(needs.resolve-observers-matrix.outputs.json || '{"count":0,"skipped_count":0,"matrix":[]}').count }}
          REQUEST_RESULT: ${{ needs.request-observers-run.result }}
        run: |
          set -euo pipefail
          astm workflow resolve matrix-run-status \
            --requested "${REQUESTED_FLAG}" \
            --result "${REQUEST_RESULT}" \
            --target-count "${TARGET_COUNT}"

      - name: Wait ${{ env.WAIT_MINUTES }} minutes for Asterism async processing
        if: ${{ !cancelled() && always() && steps.report.outcome == 'success' }}
        uses: akitorahayashi/wait@v1
        with:
          enabled: ${{ fromJSON(steps.report.outputs.json || '{}').requested == true }}
          minutes: ${{ env.WAIT_MINUTES }}
          seconds: ${{ env.MOCK_MODE == 'true' && '15' || '' }}
          label: 'Asterism async processing for observers'

  # ============================================================
  # Run merger and wait
  # ============================================================

  
  
  
  
  run-merger:
    needs: ["resolve-optimizers-plan", "report-observers-status"]
    
    if: |
      !cancelled() &&


    
      (needs.resolve-optimizers-plan.result == 'success' || needs.resolve-optimizers-plan.result == 'skipped') &&
    

    
      (needs.report-observers-status.result == 'success' || needs.report-observers-status.result == 'skipped') &&
    

    
      fromJSON(needs.resolve-optimizers-plan.outputs.json || '{}').run_merger == true
    
    runs-on: ubuntu-latest
    timeout-minutes: 100
    outputs:
      json: ${{ steps.report.outputs.json }}
    env:
      JULES_API_KEY: ${{ secrets.JULES_API_KEY }}
      GH_TOKEN: ${{ secrets.ASTM_BOT_PAT }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: 'jules'
          fetch-depth: 0
          token: ${{ secrets.ASTM_BOT_PAT }}


      - name: Configure Git
        run: |
          set -euo pipefail
          git config user.name "aria"
          git config user.email "aria67323@gmail.com"

      - name: Install astm
        uses: asterismhq/setup-astm@v2
        with:
          token: ${{ secrets.ASTM_INSTALL_PAT }}
          version: '27.1.0'
          submodule_token: ${{ secrets.ASTM_SUBMODULE_PAT }}
      - name: Run merger
        id: run
        if: ${{ fromJSON(needs.resolve-optimizers-plan.outputs.json || '{}').run_merger == true }}
        continue-on-error: true
        uses: akitorahayashi/retry@v1
        with:
          command: >-
            astm run --json merger ${{ env.ASTM_RUN_FLAGS }}
          max_attempts: '8'
          retry_delay_schedule_seconds: '1,2,4,8,16,32,64'
      - name: Report Run merger status
        id: report
        if: ${{ always() }}
        env:
          REQUESTED_FLAG: ${{ fromJSON(needs.resolve-optimizers-plan.outputs.json || '{}').run_merger == true }}
          REQUEST_RESULT: ${{ steps.run.outcome }}
          RUN_JSON: ${{ steps.run.outputs.final_stdout || '{}' }}
        run: |
          set -euo pipefail
          astm workflow resolve run-status \
            --requested "${REQUESTED_FLAG}" \
            --result "${REQUEST_RESULT}" \
            --run-json "${RUN_JSON}"

      - name: Wait ${{ env.WAIT_MINUTES }} minutes for Asterism async processing
        if: ${{ !cancelled() && always() && steps.report.outcome == 'success' }}
        uses: akitorahayashi/wait@v1
        with:
          enabled: ${{ fromJSON(steps.report.outputs.json || '{}').requested == true }}
          minutes: ${{ env.WAIT_MINUTES }}
          seconds: ${{ env.MOCK_MODE == 'true' && '15' || '' }}
          label: 'Asterism async processing for merger'

  # ============================================================
  # Run dispatcher and wait
  # ============================================================

  
  
  
  
  run-dispatcher:
    needs: ["resolve-optimizers-plan", "run-merger"]
    
    if: |
      !cancelled() &&


    
      (needs.resolve-optimizers-plan.result == 'success' || needs.resolve-optimizers-plan.result == 'skipped') &&
    

    
      (needs.run-merger.result == 'success' || needs.run-merger.result == 'skipped') &&
    

    
      fromJSON(needs.resolve-optimizers-plan.outputs.json || '{}').run_dispatcher == true
    
    runs-on: ubuntu-latest
    timeout-minutes: 100
    outputs:
      json: ${{ steps.report.outputs.json }}
    env:
      JULES_API_KEY: ${{ secrets.JULES_API_KEY }}
      GH_TOKEN: ${{ secrets.ASTM_BOT_PAT }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: 'jules'
          fetch-depth: 0
          token: ${{ secrets.ASTM_BOT_PAT }}


      - name: Configure Git
        run: |
          set -euo pipefail
          git config user.name "aria"
          git config user.email "aria67323@gmail.com"

      - name: Install astm
        uses: asterismhq/setup-astm@v2
        with:
          token: ${{ secrets.ASTM_INSTALL_PAT }}
          version: '27.1.0'
          submodule_token: ${{ secrets.ASTM_SUBMODULE_PAT }}
      - name: Run dispatcher
        id: run
        if: ${{ fromJSON(needs.resolve-optimizers-plan.outputs.json || '{}').run_dispatcher == true }}
        continue-on-error: true
        uses: akitorahayashi/retry@v1
        with:
          command: >-
            astm run --json dispatcher ${{ env.ASTM_RUN_FLAGS }}
          max_attempts: '8'
          retry_delay_schedule_seconds: '1,2,4,8,16,32,64'
      - name: Report Run dispatcher status
        id: report
        if: ${{ always() }}
        env:
          REQUESTED_FLAG: ${{ fromJSON(needs.resolve-optimizers-plan.outputs.json || '{}').run_dispatcher == true }}
          REQUEST_RESULT: ${{ steps.run.outcome }}
          RUN_JSON: ${{ steps.run.outputs.final_stdout || '{}' }}
        run: |
          set -euo pipefail
          astm workflow resolve run-status \
            --requested "${REQUESTED_FLAG}" \
            --result "${REQUEST_RESULT}" \
            --run-json "${RUN_JSON}"

      - name: Wait ${{ env.WAIT_MINUTES }} minutes for Asterism async processing
        if: ${{ !cancelled() && always() && steps.report.outcome == 'success' }}
        uses: akitorahayashi/wait@v1
        with:
          enabled: ${{ fromJSON(steps.report.outputs.json || '{}').requested == true }}
          minutes: ${{ env.WAIT_MINUTES }}
          seconds: ${{ env.MOCK_MODE == 'true' && '15' || '' }}
          label: 'Asterism async processing for dispatcher'

  # ============================================================
  # Publish requirements lane to implementer issues
  # ============================================================

  publish-implementer-requirements:
    needs: ["resolve-optimizers-plan", "run-dispatcher"]
    if: |
      !cancelled() &&

      (needs.resolve-optimizers-plan.result == 'success' || needs.resolve-optimizers-plan.result == 'skipped') &&

      (needs.run-dispatcher.result == 'success' || needs.run-dispatcher.result == 'skipped') &&


      fromJSON(needs.resolve-optimizers-plan.outputs.json || '{}').run_publish_requirements == true

    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      GH_TOKEN: ${{ secrets.ASTM_BOT_PAT }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: 'jules'
          fetch-depth: 0
          token: ${{ secrets.ASTM_BOT_PAT }}


      - name: Configure Git
        run: |
          set -euo pipefail
          git config user.name "aria"
          git config user.email "aria67323@gmail.com"

      - name: Install astm
        uses: asterismhq/setup-astm@v2
        with:
          token: ${{ secrets.ASTM_INSTALL_PAT }}
          version: '27.1.0'
          submodule_token: ${{ secrets.ASTM_SUBMODULE_PAT }}

      - name: Publish implementer issues (requirements)
        id: publish

        if: ${{ fromJSON(needs.resolve-optimizers-plan.outputs.json || '{}').run_publish_requirements == true }}

        run: |
          set -euo pipefail
          astm workflow publish implementer-issues requirements

      - name: Validate structure
        run: astm workflow validate

      - name: Create sync PR
        id: sync_pr
        run: |
          astm workflow create-sync-pr \
            --preset "publish-implementer-requirements"

      - name: Wait for implementer issue publication sync PR merge
        id: wait_for_sync_pr
        if: ${{ fromJSON(steps.sync_pr.outputs.json || '{}').applied == true }}
        env:
          GH_TOKEN: ${{ secrets.ASTM_BOT_PAT }}
          PR_NUMBER: ${{ fromJSON(steps.sync_pr.outputs.json || '{}').pr_number }}
        uses: akitorahayashi/retry@v1
        with:
          command: >-
            astm workflow gh inspect-pr-merge "$PR_NUMBER"
          max_attempts: '8'
          retry_on: error
          retry_on_exit_codes: '11'
          # Sync PR merge state has an initial GitHub visibility lag after publication. The first retry waits 3s; later retries use 1,2,4,8,16,32s.
          retry_delay_schedule_seconds: '10,1,2,4,8,16,32'

      - name: Roll back published issues on sync failure
        if: ${{ always() && steps.publish.outcome == 'success' && fromJSON(steps.publish.outputs.json || '{}').published_count > 0 && (steps.sync_pr.outcome == 'failure' || (fromJSON(steps.sync_pr.outputs.json || '{}').applied == true && steps.wait_for_sync_pr.outcome == 'failure')) }}
        env:
          GH_TOKEN: ${{ secrets.ASTM_BOT_PAT }}
          PUBLISHED_JSON: ${{ steps.publish.outputs.json || '{}' }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          echo "Rolling back published implementer issues because worker-branch sync was not completed."
          jq -r '.published[]?.issue_number' <<<"${PUBLISHED_JSON}" | while read -r issue_number; do
            if [ -n "${issue_number}" ]; then
              gh issue close "${issue_number}" --repo "${REPO}"
            fi
          done
  # ============================================================
  # Resolve and run planner (matrix)
  # ============================================================

  resolve-planner-matrix:
    needs: ["resolve-optimizers-plan", "run-dispatcher"]
    if: |
      !cancelled() &&

      (needs.resolve-optimizers-plan.result == 'success' || needs.resolve-optimizers-plan.result == 'skipped') &&

      (needs.run-dispatcher.result == 'success' || needs.run-dispatcher.result == 'skipped') &&


      fromJSON(needs.resolve-optimizers-plan.outputs.json || '{}').run_planner == true

    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      GH_TOKEN: ${{ secrets.ASTM_BOT_PAT }}
    outputs:
      json: ${{ steps.resolve.outputs.json }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: 'jules'
          fetch-depth: 0
          token: ${{ secrets.ASTM_BOT_PAT }}


      - name: Configure Git
        run: |
          set -euo pipefail
          git config user.name "aria"
          git config user.email "aria67323@gmail.com"

      - name: Install astm
        uses: asterismhq/setup-astm@v2
        with:
          token: ${{ secrets.ASTM_INSTALL_PAT }}
          version: '27.1.0'
          submodule_token: ${{ secrets.ASTM_SUBMODULE_PAT }}

      - name: Resolve planner targets
        id: resolve

        run: |
          set -euo pipefail
          static_target="${STATIC_TARGET:-}"
          if [ -n "${static_target}" ]; then
            json=$(printf '{"layer":"%s","count":1,"skipped_count":0,"matrix":[{"target":"%s"}]}' "planner" "${static_target}")
            {
              echo "json=${json}"
              echo "count=1"
              echo "skipped_count=0"
              echo "layer=planner"
            } >> "${GITHUB_OUTPUT}"
          elif [ "${MOCK_MODE}" = "true" ]; then
            astm workflow resolve matrix --layer planner --mock
          else
            astm workflow resolve matrix --layer planner
          fi

  
  
  
  
  
  request-planner-run:
    needs: ["resolve-optimizers-plan", "resolve-planner-matrix"]
    
    if: |
      !cancelled() &&



    
      needs.resolve-optimizers-plan.result == 'success' &&
    

    
      needs.resolve-planner-matrix.result == 'success' &&
    

      fromJSON(needs.resolve-optimizers-plan.outputs.json || '{}').run_planner == true &&
      fromJSON(needs.resolve-planner-matrix.outputs.json || '{"count":0,"skipped_count":0,"matrix":[]}').count > 0
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # Asterism API session creation requests must run strictly one-by-one.
    # Keep max-parallel fixed to 1; worker limits are enforced by target truncation at matrix-resolution time.
    # The matrix is kept for visibility of resolved target count in the GitHub Actions GUI.
    strategy:
      matrix:
        include: ${{ fromJSON(needs.resolve-planner-matrix.outputs.json || '{"count":0,"skipped_count":0,"matrix":[]}').matrix }}
      max-parallel: 1
      fail-fast: false
    outputs:
      json: ${{ steps.run.outputs.final_stdout }}
    env:
      JULES_API_KEY: ${{ secrets.JULES_API_KEY }}
      GH_TOKEN: ${{ secrets.ASTM_BOT_PAT }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: 'jules'
          fetch-depth: 0
          token: ${{ secrets.ASTM_BOT_PAT }}


      - name: Configure Git
        run: |
          set -euo pipefail
          git config user.name "aria"
          git config user.email "aria67323@gmail.com"

      - name: Install astm
        uses: asterismhq/setup-astm@v2
        with:
          token: ${{ secrets.ASTM_INSTALL_PAT }}
          version: '27.1.0'
          submodule_token: ${{ secrets.ASTM_SUBMODULE_PAT }}

      - name: Run planner (${{ matrix.target }})
        id: run
        uses: akitorahayashi/retry@v1
        with:
          command: >-
            astm run --json planner --requirement "${{ matrix.target }}" ${{ env.ASTM_RUN_FLAGS }}
          max_attempts: '8'
          retry_delay_schedule_seconds: '1,2,4,8,16,32,64'

  report-planner-status:
    needs: ["resolve-optimizers-plan", "resolve-planner-matrix", "request-planner-run"]
    if: |
      !cancelled() &&
      always() &&

      needs.resolve-optimizers-plan.result == 'success' &&
      needs.resolve-planner-matrix.result == 'success'


      &&
      fromJSON(needs.resolve-optimizers-plan.outputs.json || '{}').run_planner == true

    runs-on: ubuntu-latest
    timeout-minutes: 70
    outputs:
      json: ${{ steps.report.outputs.json }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: 'jules'
          fetch-depth: 0
          token: ${{ secrets.ASTM_BOT_PAT }}


      - name: Configure Git
        run: |
          set -euo pipefail
          git config user.name "aria"
          git config user.email "aria67323@gmail.com"

      - name: Install astm
        uses: asterismhq/setup-astm@v2
        with:
          token: ${{ secrets.ASTM_INSTALL_PAT }}
          version: '27.1.0'
          submodule_token: ${{ secrets.ASTM_SUBMODULE_PAT }}

      - name: Report Run planner status
        id: report
        env:
          REQUESTED_FLAG: ${{ fromJSON(needs.resolve-optimizers-plan.outputs.json || '{}').run_planner == true }}
          TARGET_COUNT: ${{ fromJSON(needs.resolve-planner-matrix.outputs.json || '{"count":0,"skipped_count":0,"matrix":[]}').count }}
          REQUEST_RESULT: ${{ needs.request-planner-run.result }}
        run: |
          set -euo pipefail
          astm workflow resolve matrix-run-status \
            --requested "${REQUESTED_FLAG}" \
            --result "${REQUEST_RESULT}" \
            --target-count "${TARGET_COUNT}"

      - name: Wait ${{ env.WAIT_MINUTES }} minutes for Asterism async processing
        if: ${{ !cancelled() && always() && steps.report.outcome == 'success' }}
        uses: akitorahayashi/wait@v1
        with:
          enabled: ${{ fromJSON(steps.report.outputs.json || '{}').requested == true }}
          minutes: ${{ env.WAIT_MINUTES }}
          seconds: ${{ env.MOCK_MODE == 'true' && '15' || '' }}
          label: 'Asterism async processing for planner'

  # ============================================================
  # Publish plans lane to implementer issues
  # ============================================================

  publish-implementer-plans:
    needs: ["resolve-optimizers-plan", "report-planner-status"]
    if: |
      !cancelled() &&

      (needs.resolve-optimizers-plan.result == 'success' || needs.resolve-optimizers-plan.result == 'skipped') &&

      (needs.report-planner-status.result == 'success' || needs.report-planner-status.result == 'skipped') &&


      fromJSON(needs.resolve-optimizers-plan.outputs.json || '{}').run_publish_plans == true

    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      GH_TOKEN: ${{ secrets.ASTM_BOT_PAT }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: 'jules'
          fetch-depth: 0
          token: ${{ secrets.ASTM_BOT_PAT }}


      - name: Configure Git
        run: |
          set -euo pipefail
          git config user.name "aria"
          git config user.email "aria67323@gmail.com"

      - name: Install astm
        uses: asterismhq/setup-astm@v2
        with:
          token: ${{ secrets.ASTM_INSTALL_PAT }}
          version: '27.1.0'
          submodule_token: ${{ secrets.ASTM_SUBMODULE_PAT }}

      - name: Publish implementer issues (plans)
        id: publish

        if: ${{ fromJSON(needs.resolve-optimizers-plan.outputs.json || '{}').run_publish_plans == true }}

        run: |
          set -euo pipefail
          astm workflow publish implementer-issues plans

      - name: Validate structure
        run: astm workflow validate

      - name: Create sync PR
        id: sync_pr
        run: |
          astm workflow create-sync-pr \
            --preset "publish-implementer-plans"

      - name: Wait for implementer issue publication sync PR merge
        id: wait_for_sync_pr
        if: ${{ fromJSON(steps.sync_pr.outputs.json || '{}').applied == true }}
        env:
          GH_TOKEN: ${{ secrets.ASTM_BOT_PAT }}
          PR_NUMBER: ${{ fromJSON(steps.sync_pr.outputs.json || '{}').pr_number }}
        uses: akitorahayashi/retry@v1
        with:
          command: >-
            astm workflow gh inspect-pr-merge "$PR_NUMBER"
          max_attempts: '8'
          retry_on: error
          retry_on_exit_codes: '11'
          # Sync PR merge state has an initial GitHub visibility lag after publication. The first retry waits 3s; later retries use 1,2,4,8,16,32s.
          retry_delay_schedule_seconds: '10,1,2,4,8,16,32'

      - name: Roll back published issues on sync failure
        if: ${{ always() && steps.publish.outcome == 'success' && fromJSON(steps.publish.outputs.json || '{}').published_count > 0 && (steps.sync_pr.outcome == 'failure' || (fromJSON(steps.sync_pr.outputs.json || '{}').applied == true && steps.wait_for_sync_pr.outcome == 'failure')) }}
        env:
          GH_TOKEN: ${{ secrets.ASTM_BOT_PAT }}
          PUBLISHED_JSON: ${{ steps.publish.outputs.json || '{}' }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          echo "Rolling back published implementer issues because worker-branch sync was not completed."
          jq -r '.published[]?.issue_number' <<<"${PUBLISHED_JSON}" | while read -r issue_number; do
            if [ -n "${issue_number}" ]; then
              gh issue close "${issue_number}" --repo "${REPO}"
            fi
          done
  # ============================================================
  # Resolve and run implementer (matrix)
  # ============================================================

  resolve-implementer-matrix:
    needs: ["resolve-optimizers-plan", "publish-implementer-requirements", "publish-implementer-plans"]
    if: |
      !cancelled() &&

      (needs.resolve-optimizers-plan.result == 'success' || needs.resolve-optimizers-plan.result == 'skipped') &&

      (needs.publish-implementer-requirements.result == 'success' || needs.publish-implementer-requirements.result == 'skipped') &&

      (needs.publish-implementer-plans.result == 'success' || needs.publish-implementer-plans.result == 'skipped') &&


      fromJSON(needs.resolve-optimizers-plan.outputs.json || '{}').run_implementer == true

    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      GH_TOKEN: ${{ secrets.ASTM_BOT_PAT }}
    outputs:
      json: ${{ steps.resolve.outputs.json }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: 'jules'
          fetch-depth: 0
          token: ${{ secrets.ASTM_BOT_PAT }}


      - name: Configure Git
        run: |
          set -euo pipefail
          git config user.name "aria"
          git config user.email "aria67323@gmail.com"

      - name: Install astm
        uses: asterismhq/setup-astm@v2
        with:
          token: ${{ secrets.ASTM_INSTALL_PAT }}
          version: '27.1.0'
          submodule_token: ${{ secrets.ASTM_SUBMODULE_PAT }}

      - name: Resolve implementer targets
        id: resolve

        run: |
          set -euo pipefail
          static_target="${STATIC_TARGET:-}"
          if [ -n "${static_target}" ]; then
            json=$(printf '{"layer":"%s","count":1,"skipped_count":0,"matrix":[{"target":"%s"}]}' "implementer" "${static_target}")
            {
              echo "json=${json}"
              echo "count=1"
              echo "skipped_count=0"
              echo "layer=implementer"
            } >> "${GITHUB_OUTPUT}"
          elif [ "${MOCK_MODE}" = "true" ]; then
            astm workflow resolve matrix --layer implementer --mock
          else
            astm workflow resolve matrix --layer implementer
          fi

  
  
  
  
  
  request-implementer-run:
    needs: ["resolve-optimizers-plan", "resolve-implementer-matrix"]
    
    if: |
      !cancelled() &&



    
      (needs.resolve-optimizers-plan.result == 'success' || needs.resolve-optimizers-plan.result == 'skipped') &&
    

    
      (needs.resolve-implementer-matrix.result == 'success' || needs.resolve-implementer-matrix.result == 'skipped') &&
    

      fromJSON(needs.resolve-optimizers-plan.outputs.json || '{}').run_implementer == true &&
      fromJSON(needs.resolve-implementer-matrix.outputs.json || '{"count":0,"skipped_count":0,"matrix":[]}').count > 0
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # Asterism API session creation requests must run strictly one-by-one.
    # Keep max-parallel fixed to 1; worker limits are enforced by target truncation at matrix-resolution time.
    # The matrix is kept for visibility of resolved target count in the GitHub Actions GUI.
    strategy:
      matrix:
        include: ${{ fromJSON(needs.resolve-implementer-matrix.outputs.json || '{"count":0,"skipped_count":0,"matrix":[]}').matrix }}
      max-parallel: 1
      fail-fast: false
    outputs:
      json: ${{ steps.run.outputs.final_stdout }}
    env:
      JULES_API_KEY: ${{ secrets.JULES_API_KEY }}
      GH_TOKEN: ${{ secrets.ASTM_BOT_PAT }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: 'main'
          fetch-depth: 0
          token: ${{ secrets.ASTM_BOT_PAT }}


      - name: Configure Git
        run: |
          set -euo pipefail
          git config user.name "aria"
          git config user.email "aria67323@gmail.com"

      - name: Install astm
        uses: asterismhq/setup-astm@v2
        with:
          token: ${{ secrets.ASTM_INSTALL_PAT }}
          version: '27.1.0'
          submodule_token: ${{ secrets.ASTM_SUBMODULE_PAT }}

      - name: Run implementer (${{ matrix.target }})
        id: run
        uses: akitorahayashi/retry@v1
        with:
          command: >-
            astm run --json implementer --issue "${{ matrix.target }}" ${{ env.ASTM_RUN_FLAGS }}
          max_attempts: '8'
          retry_delay_schedule_seconds: '1,2,4,8,16,32,64'

  report-implementer-status:
    needs: ["resolve-optimizers-plan", "resolve-implementer-matrix", "request-implementer-run"]
    if: |
      !cancelled() &&
      always() &&

      (needs.resolve-optimizers-plan.result == 'success' || needs.resolve-optimizers-plan.result == 'skipped') &&
      (needs.resolve-implementer-matrix.result == 'success' || needs.resolve-implementer-matrix.result == 'skipped')


      &&
      fromJSON(needs.resolve-optimizers-plan.outputs.json || '{}').run_implementer == true

    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      json: ${{ steps.report.outputs.json }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: 'main'
          fetch-depth: 0
          token: ${{ secrets.ASTM_BOT_PAT }}


      - name: Configure Git
        run: |
          set -euo pipefail
          git config user.name "aria"
          git config user.email "aria67323@gmail.com"

      - name: Install astm
        uses: asterismhq/setup-astm@v2
        with:
          token: ${{ secrets.ASTM_INSTALL_PAT }}
          version: '27.1.0'
          submodule_token: ${{ secrets.ASTM_SUBMODULE_PAT }}

      - name: Report Run implementer status
        id: report
        env:
          REQUESTED_FLAG: ${{ fromJSON(needs.resolve-optimizers-plan.outputs.json || '{}').run_implementer == true }}
          TARGET_COUNT: ${{ fromJSON(needs.resolve-implementer-matrix.outputs.json || '{"count":0,"skipped_count":0,"matrix":[]}').count }}
          REQUEST_RESULT: ${{ needs.request-implementer-run.result }}
        run: |
          set -euo pipefail
          astm workflow resolve matrix-run-status \
            --requested "${REQUESTED_FLAG}" \
            --result "${REQUEST_RESULT}" \
            --target-count "${TARGET_COUNT}"

  # ============================================================
  # Upload and cleanup summary artifacts
  # ============================================================


  cleanup-summaries:
    needs: ["report-observers-status", "run-merger", "run-dispatcher", "publish-implementer-requirements", "publish-implementer-plans", "report-implementer-status"]
    if: |
      !cancelled() &&
      always() &&

      (needs.report-observers-status.result == 'success' || needs.report-observers-status.result == 'skipped') &&

      (needs.run-merger.result == 'success' || needs.run-merger.result == 'skipped') &&

      (needs.run-dispatcher.result == 'success' || needs.run-dispatcher.result == 'skipped') &&

      (needs.publish-implementer-requirements.result == 'success' || needs.publish-implementer-requirements.result == 'skipped') &&

      (needs.publish-implementer-plans.result == 'success' || needs.publish-implementer-plans.result == 'skipped') &&

      (needs.report-implementer-status.result == 'success' || needs.report-implementer-status.result == 'skipped')

    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      GH_TOKEN: ${{ secrets.ASTM_BOT_PAT }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: 'jules'
          fetch-depth: 0
          token: ${{ secrets.ASTM_BOT_PAT }}


      - name: Configure Git
        run: |
          set -euo pipefail
          git config user.name "aria"
          git config user.email "aria67323@gmail.com"

      - name: Detect summary artifacts
        id: summaries
        shell: bash
        run: |
          if [ -d .astm/exchange/summaries ]; then
            count="$(find .astm/exchange/summaries -maxdepth 1 -type f -name '*.md' | wc -l | tr -d ' ')"
          else
            count="0"
          fi
          if [ "${count}" = "0" ]; then
            echo "has_files=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "has_files=true" >> "$GITHUB_OUTPUT"

      - name: Upload summary artifacts
        if: ${{ steps.summaries.outputs.has_files == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ format('astm-summary-artifacts-{0}-{1}', github.run_id, github.run_attempt) }}
          path: .astm/exchange/summaries/*.md
          retention-days: 3
          if-no-files-found: error

      - name: Install astm
        if: ${{ steps.summaries.outputs.has_files == 'true' }}
        uses: asterismhq/setup-astm@v2
        with:
          token: ${{ secrets.ASTM_INSTALL_PAT }}
          version: '27.1.0'
          submodule_token: ${{ secrets.ASTM_SUBMODULE_PAT }}

      - name: Remove uploaded summary artifacts
        if: ${{ steps.summaries.outputs.has_files == 'true' }}
        run: |
          find .astm/exchange/summaries -maxdepth 1 -type f -name '*.md' -delete

      - name: Validate repository structure
        if: ${{ steps.summaries.outputs.has_files == 'true' }}
        run: astm workflow validate

      - name: Create summary cleanup sync PR
        if: ${{ steps.summaries.outputs.has_files == 'true' }}
        run: |
          astm workflow create-sync-pr \
            --preset "summary-cleanup"

  # ============================================================
  # Cleanup mock artifacts
  # ============================================================


  cleanup-mock-artifacts:
    needs: ["cleanup-summaries"]
    if: |
      !cancelled() &&
      always() &&
      (
        (github.event_name == 'workflow_dispatch' && github.event.inputs.mock == 'true') ||
        (github.event_name == 'workflow_call' && inputs.mock == true)
      )
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      GH_TOKEN: ${{ secrets.ASTM_BOT_PAT }}
      GITHUB_REPOSITORY: ${{ github.repository }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: 'jules'
          fetch-depth: 0
          token: ${{ secrets.ASTM_BOT_PAT }}


      - name: Configure Git
        run: |
          set -euo pipefail
          git config user.name "aria"
          git config user.email "aria67323@gmail.com"

      - name: Install astm
        uses: asterismhq/setup-astm@v2
        with:
          token: ${{ secrets.ASTM_INSTALL_PAT }}
          version: '27.1.0'
          submodule_token: ${{ secrets.ASTM_SUBMODULE_PAT }}

      - name: Cleanup mock artifacts for this run
        run: |
          astm workflow clean-mock --mock-tag "$ASTM_MOCK_TAG"

      - name: Validate repository structure
        run: astm workflow validate

      - name: Create mock cleanup sync PR
        run: |
          astm workflow create-sync-pr \
            --preset "mock-cleanup-${ASTM_MOCK_TAG}"


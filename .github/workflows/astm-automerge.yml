# This file is auto-generated. Do not edit manually.
name: Asterism Auto-merge

on:
  push:
    branches:
      - 'astm-observer-*'
      - 'astm-merger-*'
      - 'astm-dispatcher-*'
      - 'astm-planner-*'
      - 'astm-innovators-*'
      - 'astm-worker-sync-*'

permissions: {}

env:
  ASTM_TARGET_BRANCH: 'main'
  ASTM_WORKER_BRANCH: 'jules'

jobs:
  validate-and-automerge:
    if: ${{ github.event.deleted == false }}
    runs-on: ubuntu-latest
    concurrency:
      group: ${{ format('astm-automerge-branch-{0}', github.ref_name) }}
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0
          token: ${{ secrets.ASTM_BOT_PAT }}

      - name: Install astm
        uses: asterismhq/setup-astm@v2
        with:
          token: ${{ secrets.ASTM_INSTALL_PAT }}
          version: '27.1.0'
          submodule_token: ${{ secrets.ASTM_SUBMODULE_PAT }}

      - name: Discover open PR for pushed branch
        id: discover
        uses: akitorahayashi/retry@v1
        env:
          GH_TOKEN: ${{ secrets.ASTM_BOT_PAT }}
        with:
          command: >-
            astm workflow gh discover-pr "${GITHUB_REF_NAME}"
          max_attempts: '12'
          retry_on: error
          retry_on_exit_codes: '11'
          retry_delay_schedule_seconds: '1,2,5,5,5,5,5,5,5,5,5'

      - name: Validate branch contract
        run: |
          set -euo pipefail
          echo "::group::Validate check"

          mode=""
          layer=""
          case "${GITHUB_REF_NAME}" in
            astm-observer-*)
              mode="layer"
              layer="observers"
              ;;
            astm-merger-*)
              mode="layer"
              layer="merger"
              ;;
            astm-dispatcher-*)
              mode="layer"
              layer="dispatcher"
              ;;
            astm-planner-*)
              mode="layer"
              layer="planner"
              ;;
            astm-innovators-*)
              mode="layer"
              layer="innovators"
              ;;
            astm-worker-sync-*)
              mode="structure"
              ;;
            *)
              echo "::error::Unknown automerge branch '${GITHUB_REF_NAME}'."
              exit 1
              ;;
          esac

          if [ "${mode}" = "structure" ]; then
            astm workflow validate
          else
            astm workflow validate --after-layer "${layer}"
          fi
          echo "::endgroup::"

      - name: Process PR auto-merge
        uses: akitorahayashi/retry@v1
        env:
          GH_TOKEN: ${{ secrets.ASTM_BOT_PAT }}
        with:
          command: >-
            astm workflow gh enable-pr-automerge ${{ steps.discover.outputs.pr_number }}
          max_attempts: '7'
          timeout_seconds: '300'
          retry_delay_schedule_seconds: '1,2,4,8,16,32'
          retry_on: any
          termination_grace_seconds: '5'

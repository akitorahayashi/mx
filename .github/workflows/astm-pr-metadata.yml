# This file is auto-generated. Do not edit manually.
name: Asterism PR Metadata

on:
  push:
    branches:
      - 'astm-implementer-*'
      - 'astm-integrator-*'
      - 'astm-doctors-*'

permissions: {}

env:
  ASTM_TARGET_BRANCH: 'main'
  ASTM_WORKER_BRANCH: 'jules'

jobs:
  process-pr-metadata:
    runs-on: ubuntu-latest
    concurrency:
      group: ${{ format('astm-pr-metadata-{0}', github.ref_name) }}
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: 'jules'
          fetch-depth: 1
          token: ${{ secrets.ASTM_BOT_PAT }}

      - name: Install astm
        uses: asterismhq/setup-astm@v2
        with:
          token: ${{ secrets.ASTM_INSTALL_PAT }}
          version: '27.1.0'
          submodule_token: ${{ secrets.ASTM_SUBMODULE_PAT }}

      - name: Discover PR number
        id: discover
        uses: akitorahayashi/retry@v1
        env:
          GH_TOKEN: ${{ secrets.ASTM_BOT_PAT }}
          BRANCH_NAME: ${{ github.ref_name }}
        with:
          command: >-
            astm workflow gh discover-pr "${BRANCH_NAME}"
          max_attempts: '7'
          retry_on: error
          retry_on_exit_codes: '11'
          retry_delay_schedule_seconds: '1,2,4,8,16,32'

      - name: Sync PR metadata label
        env:
          GH_TOKEN: ${{ secrets.ASTM_BOT_PAT }}
          PR_NUMBER: ${{ steps.discover.outputs.pr_number }}
        run: astm workflow gh sync-pr-category-label "$PR_NUMBER"

      - name: Validate linked GitHub token
        env:
          LINKED_GH_TOKEN: ${{ secrets.JULES_LINKED_GH_PAT }}
        run: |
          set -euo pipefail
          if [ -z "${LINKED_GH_TOKEN}" ]; then
            echo "::error::JULES_LINKED_GH_PAT is required for PR metadata summary request comments."
            exit 1
          fi

      - name: Post summary request comment
        env:
          GH_TOKEN: ${{ secrets.JULES_LINKED_GH_PAT }}
        run: astm workflow gh post-pr-summary-request ${{ steps.discover.outputs.pr_number }}
